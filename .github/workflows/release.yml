name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install frontend dependencies
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Dustpan ${{ github.ref_name }}"
          releaseBody: |
            ## Download

            | File | Description |
            |------|-------------|
            | `Dustpan_*_x64-setup.exe` | Recommended — NSIS standalone installer |
            | `Dustpan_*_x64_en-US.msi` | Windows Installer package |

            > **Windows SmartScreen warning?**
            > Click **More info → Run anyway**. The app is not code-signed yet.

            ---

            ## What's new

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for the full list of changes in this release.

            ---

            ## Requirements

            - Windows 10 or later (64-bit)
            - No additional runtime required
          releaseDraft: true
          prerelease: false
